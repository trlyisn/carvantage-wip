<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* CSS Reset & Basic Setup */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            /* Soft, neutral off-white */
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Centering the content using Flexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Container for the text */
        .message-container {
            padding: 2rem;
            max-width: 600px;
            width: 90%;
        }

        /* Typography */
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            color: #1a1a1a;
            letter-spacing: -0.05rem;
        }

        p {
            font-size: 1.25rem;
            color: #6c757d;
            margin: 0;
            line-height: 1.6;
        }

        /* Responsive adjustments for smaller screens (phones) */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.25rem;
            }

            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="message-container">
        <h1 id="headline">Something great is coming.</h1>
        <p id="description">We are working hard behind the scenes to bring you a brand new experience. Check back soon.
        </p>
    </div>

    <script>
        (function () {
            var locale = (navigator.languages && navigator.languages.length ? navigator.languages[0] : navigator.language || 'en').toLowerCase();
            var isCzech = locale.indexOf('cs') === 0;

            var copy = isCzech ? {
                lang: 'cs',
                title: 'Brzy bude hotovo',
                headline: 'Připravujeme něco skvělého.',
                description: 'Usilovně pracujeme v zákulisí, abychom vám přinesli úplně nový zážitek. Brzy se vraťte.'
            } : {
                lang: 'en',
                title: 'Coming Soon',
                headline: 'Something great is coming.',
                description: 'We are working hard behind the scenes to bring you a brand new experience. Check back soon.'
            };

            document.documentElement.lang = copy.lang;
            document.title = copy.title;
            document.getElementById('headline').textContent = copy.headline;
            document.getElementById('description').textContent = copy.description;
        }());
    </script>

</body>

</html>
